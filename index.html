<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e0e5ec;
    font-family:'Segoe UI', sans-serif;
}

/* Container */
.container{
    text-align:center;
    padding:40px;
    border-radius:25px;
    background:#e0e5ec;
    box-shadow:
        10px 10px 25px #b8bec7,
        -10px -10px 25px #ffffff;
}

/* Title */
h1{
    font-size:32px;
    color:#555;
    margin-bottom:10px;
}

/* Subtitle */
p{
    color:#777;
    margin-bottom:25px;
}

/* GIF container */
.gif-box{
    width:200px;
    height:200px;
    margin:auto;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#e0e5ec;
    box-shadow:
        inset 6px 6px 12px #b8bec7,
        inset -6px -6px 12px #ffffff;
}

/* GIF */
.gif-box img{
    width:120px;
}

</style>
</head>
<body>

<div class="container">

<h1>🚧 Under Construction</h1>
<p>This page is being built. Please check back soon!</p>

<div class="gif-box">
<img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif">
</div>

</div>

</body>
</html>
